; PlatformIO Project Configuration File
; XIAO ESP32S3 Sense Security Camera System
; 
; Hardware: Seeed Studio XIAO ESP32S3 Sense
; Features: AI Person Detection, Alert System, LINE Notify, Video Recording

[env:seeed_xiao_esp32s3]
platform = espressif32@^6.4.0
board = seeed_xiao_esp32s3
framework = arduino

; Build settings
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DUSE_PSRAM
    -DCC_ENABLE_CHIPMUNK_COMPATIBILITY
    -DCONFIG_SPIRAM_CACHE_WORKAROUND
    -DCONFIG_SPIRAM_IGNORE_NOTFOUND
    
; Serial monitor settings
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; Upload settings
upload_speed = 921600
upload_port = COM3

; Library dependencies
lib_deps = 
    ; Core ESP32 libraries
    espressif/esp32-camera@^2.0.4
    me-no-dev/ESPAsyncWebServer@^1.2.3
    me-no-dev/AsyncTCP@^1.1.1
    
    ; JSON handling
    bblanchon/ArduinoJson@^7.0.4
    
    ; HTTP client for LINE Notify
    espressif/esp_http_client@^1.0.0
    
    ; TensorFlow Lite Micro for AI inference
    eloquentarduino/EloquentTinyML@^2.4.2
    
    ; Time handling
    paulstoffregen/Time@^1.6.1
    
    ; File system and SD card
    ; Built-in libraries: SD_MMC, FS, SPIFFS

; Board specific configuration
board_build.partitions = huge_app.csv
board_build.filesystem = spiffs